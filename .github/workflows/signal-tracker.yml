# Radar forward test: record picks premarket, score them after the close.
#
# Why this exists: backtests can flatter a lucky strategy. The only honest
# test is out-of-sample — write the picks down BEFORE the open (this workflow
# commits them, so the timestamp is tamper-proof), then score them later at
# real market prices against SPY. data/scoreboard.md holds the running stats.
#
# Cron pairs cover both CST and CDT; scripts/validate.py checks the Central
# clock and only acts inside its window, so exactly one run per day does
# each job. Minutes are off the hour — GitHub drops on-the-hour crons.

name: Signal Tracker

on:
  schedule:
    - cron: "55 12,13 * * 1-5"  # record  ~7:55 AM Central (premarket)
    - cron: "25 22,23 * * 1-5"  # evaluate + report ~5:25 PM Central
  workflow_dispatch:
    inputs:
      mode:
        description: "auto | record | evaluate | report"
        default: "auto"

concurrency:
  group: signal-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE: ${{ github.event_name != 'schedule' && '1' || '' }}
        run: python3 scripts/validate.py "${{ inputs.mode || 'auto' }}"
      - name: Commit results
        run: |
          git config user.name "signal-tracker[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: signal tracker $(date -u +%FT%H:%MZ)"
          for wait in 2 4 8 16; do
            git push && exit 0
            git pull --rebase && sleep "$wait"
          done
          git push
